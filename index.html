      function showClearDataModal() {
        var GAMES = [{
            title: '⚔️ DartQuest',
            keys: [DQ_SAVE, DQ_BEST],
            describe: function() {
              var saved = storage.get(DQ_SAVE);
              var best = storage.get(DQ_BEST, 0);
              var bits = [];
              if (saved) bits.push('In progress · Level ' + saved.level);
              if (best > 0) bits.push('Best Level ' + best);
              return bits.length ? bits.join(' · ') : 'No data';
            }
          },
          {
            title: '🏌️ Golf Darts',
            keys: [GD_SAVE, GD_BEST_ROUND, GD_BEST_TOUR],
            describe: function() {
              var saved = storage.get(GD_SAVE);
              var bestRound = storage.get(GD_BEST_ROUND);
              var bestTour = storage.get(GD_BEST_TOUR);
              var bits = [];
              if (saved) bits.push('In progress · Round ' + saved.round);
              if (bestTour) bits.push('Best tour ' + golfFormat(bestTour.score));
              if (bestRound) bits.push('Best round ' + golfFormat(bestRound.score));
              return bits.length ? bits.join(' · ') : 'No data';
            }
          },
          {
            title: '🎯 Wordle Darts',
            keys: [WD_STATE, WD_STATS, WD_DIFFICULTY],
            describe: function() {
              var state = storage.get(WD_STATE);
              var stats = storage.get(WD_STATS);
              var difficulty = storage.get(WD_DIFFICULTY);
              var bits = [];
              if (state && state.guesses && state.guesses.length && !state.over) bits.push('Round in progress');
              if (stats && stats.played) bits.push(stats.won + '/' + stats.played + ' wins');
              if (difficulty) bits.push(difficulty + '-round preference');
              return bits.length ? bits.join(' · ') : 'No data';
            }
          }
        ];

        var overlay = el('div', 'overlay');
        overlay.onclick = function(e) {
          if (e.target === overlay) overlay.remove();
        };
        var card = el('div', 'overlay-card rules-card');
        card.appendChild(el('h3', null, 'Clear saved data'));
        card.appendChild(el('p', null, 'Remove game progress from this device.'));

        var list = el('div', 'clear-list');
        card.appendChild(list);

        function renderList() {
          list.innerHTML = '';
          GAMES.forEach(function(g) {
            var hasData = g.keys.some(function(k) {
              return storage.get(k) != null;
            });
            var row = el('div', 'clear-row');
            var text = el('div', 'clear-row-text');
            text.appendChild(el('div', 'clear-row-title', g.title));
            text.appendChild(el('div', 'clear-row-desc', g.describe()));
            var clearBtn = el('button', 'btn-ghost', 'Clear');
            clearBtn.disabled = !hasData;
            clearBtn.onclick = function() {
              if (!confirm('Clear saved data for ' + g.title + '?')) return;
              g.keys.forEach(function(k) {
                storage.remove(k);
              });
              renderList();
            };
            row.appendChild(text);
            row.appendChild(clearBtn);
            list.appendChild(row);
          });
        }

        renderList();

        var actions = el('div', 'overlay-actions');
        var clearAll = el('button', 'btn-primary', 'Clear everything');
        clearAll.onclick = function() {
          if (!confirm('Clear all saved data from every game? This can’t be undone.')) return;
          GAMES.forEach(function(g) {
            g.keys.forEach(function(k) {
              storage.remove(k);
            });
          });
          overlay.remove();
          renderHome();
        };
        var close = el('button', 'btn-ghost', 'Close');
        close.onclick = function() {
          overlay.remove();
          renderHome();
        };
        actions.appendChild(clearAll);
        actions.appendChild(close);
        card.appendChild(actions);

        overlay.appendChild(card);
        document.body.appendChild(overlay);
      }

      function renderHome() {
        root.innerHTML = '';
        var header = el('div', 'home-header');
        var dartIcon = el('div', 'home-dart');
        dartIcon.setAttribute('aria-hidden', 'true');
        dartIcon.innerHTML = '' +
          '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">' +
          '<defs>' +
          '<linearGradient id="homeDartFlight" x1="0" y1="0" x2="1" y2="1">' +
          '<stop offset="0" stop-color="#e63946"/>' +
          '<stop offset="1" stop-color="#f4a261"/>' +
          '</linearGradient>' +
          '<linearGradient id="homeDartBarrel" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0" stop-color="#cbd5e1"/>' +
          '<stop offset="0.5" stop-color="#64748b"/>' +
          '<stop offset="1" stop-color="#334155"/>' +
          '</linearGradient>' +
          '<linearGradient id="homeDartShaft" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0" stop-color="#cbd5e1"/>' +
          '<stop offset="1" stop-color="#64748b"/>' +
          '</linearGradient>' +
          '</defs>' +
          '<g transform="rotate(-45 50 50)">' +
          '<path d="M4 50 L18 44 L18 56 Z" fill="#e2e8f0"/>' +
          '<rect x="18" y="42" width="22" height="16" fill="url(#homeDartBarrel)" rx="2"/>' +
          '<rect x="22" y="44" width="14" height="1.5" fill="rgba(255,255,255,0.35)"/>' +
          '<rect x="40" y="48" width="26" height="4" fill="url(#homeDartShaft)"/>' +
          '<path d="M66 50 L88 36 L96 40 L82 50 L96 60 L88 64 Z" fill="url(#homeDartFlight)"/>' +
          '<path d="M66 50 L88 36 L82 50 Z" fill="rgba(255,255,255,0.22)"/>' +
          '</g>' +
          '</svg>';
        header.appendChild(dartIcon);
        header.appendChild(el('h1', null, 'Darts Games'));
        header.appendChild(el('div', 'subtitle', 'Pick a game'));
        root.appendChild(header);

        var tiles = el('div', 'home-tiles');

        var quest = el('div', 'tile');
        quest.setAttribute('role', 'button');
        quest.setAttribute('tabindex', '0');
        var questRules = el('button', 'tile-rules-btn', 'How to play');
        questRules.onclick = function(e) {
          e.stopPropagation();
          showDartQuestRules();
        };
        quest.appendChild(questRules);
        quest.appendChild(el('h2', null, '⚔️ DartQuest'));
        quest.appendChild(el('p', null, 'Throw darts, fight enemies, level up. Triples crit, bullseyes smash.'));
        var bestLevel = storage.get(DQ_BEST, 0);
        var saved = storage.get(DQ_SAVE);
        var qStat = el('div', 'tile-stat');
        if (saved) qStat.textContent = 'In progress · Level ' + saved.level + ' · Best Lv ' + bestLevel;
        else qStat.textContent = bestLevel > 0 ? ('Best: Level ' + bestLevel) : 'New quest awaits';
        quest.appendChild(qStat);
        quest.onclick = function() {
          location.hash = '#/dartquest';
        };
        quest.onkeydown = function(e) {
          if (e.target !== quest) return;
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            location.hash = '#/dartquest';
          }
        };
        tiles.appendChild(quest);

        var golf = el('div', 'tile');
        golf.setAttribute('role', 'button');
        golf.setAttribute('tabindex', '0');
        var golfRules = el('button', 'tile-rules-btn', 'How to play');
        golfRules.onclick = function(e) {
          e.stopPropagation();
          showGolfRules();
        };
        golf.appendChild(golfRules);
        golf.appendChild(el('h2', null, '🏌️ Golf Darts'));
        golf.appendChild(el('p', null, '4 rounds, 18 holes. Aim for inner singles for par — bulls are eagles.'));
        var golfSave = storage.get(GD_SAVE);
        var golfBestRound = storage.get(GD_BEST_ROUND, null);
        var golfBestTour = storage.get(GD_BEST_TOUR, null);
        var gStat = el('div', 'tile-stat');
        if (golfSave && golfSave.round) {
          gStat.textContent = 'In progress · Round ' + golfSave.round + ' · Hole ' + golfSave.hole;
        } else if (golfBestTour || golfBestRound) {
          var bits = [];
          if (golfBestTour) bits.push('Best tour ' + golfFormat(golfBestTour.score));
          if (golfBestRound) bits.push('Best round ' + golfFormat(golfBestRound.score));
          gStat.textContent = bits.join(' · ');
        } else {
          gStat.textContent = 'Tee it up';
        }
        golf.appendChild(gStat);
        golf.onclick = function() {
          location.hash = '#/golfdarts';
        };
        golf.onkeydown = function(e) {
          if (e.target !== golf) return;
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            location.hash = '#/golfdarts';
          }
        };
        tiles.appendChild(golf);

        var wordle = el('div', 'tile');
        wordle.setAttribute('role', 'button');
        wordle.setAttribute('tabindex', '0');
        var wordleRules = el('button', 'tile-rules-btn', 'How to play');
        wordleRules.onclick = function(e) {
          e.stopPropagation();
          showWordleRules();
        };
        wordle.appendChild(wordleRules);
        wordle.appendChild(el('h2', null, '🎯 Wordle Darts'));
        wordle.appendChild(el('p', null, 'Guess the secret 3-dart combo of singles. Wordle-style feedback.'));
        var stats = storage.get(WD_STATS);
        var wStat = el('div', 'tile-stat');
        if (stats && stats.played) {
          wStat.textContent = stats.won + '/' + stats.played + ' wins · Streak ' + stats.streak;
        } else {
          wStat.textContent = 'First round ready';
        }
        wordle.appendChild(wStat);
        wordle.onclick = function() {
          location.hash = '#/wordle';
        };
        wordle.onkeydown = function(e) {
          if (e.target !== wordle) return;
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            location.hash = '#/wordle';
          }
        };
        tiles.appendChild(wordle);

        root.appendChild(tiles);

        root.appendChild(el('div', 'flex-spacer'));
        var foot = el('div', 'subtitle');
        foot.style.textAlign = 'center';
        foot.style.padding = '16px';
        foot.style.fontSize = '12px';
        foot.appendChild(document.createTextNode('Progress saved on this device · '));
        var clearLink = el('button', 'link-like', 'Clear');
        clearLink.onclick = showClearDataModal;
        foot.appendChild(clearLink);
        root.appendChild(foot);
      }

      function route() {
        var hash = location.hash || '#/';
        if (hash.indexOf('#/dartquest') === 0) renderDartQuest(root);
        else if (hash.indexOf('#/golfdarts') === 0) renderGolfDarts(root);
        else if (hash.indexOf('#/wordle') === 0) renderWordleDarts(root);
        else renderHome();
        window.scrollTo(0, 0);
      }

      window.addEventListener('hashchange', route);
      route();
    })();
  </script>
</body>
</html>
